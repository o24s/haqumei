[package]
name = "haqumei"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
readme = "README.md"
build = "build.rs"


[features]
default = ["embed-dictionary"]
embed-dictionary = []

[dependencies]
arc-swap = "1.7.1"
dirs = "6.0.0"
hex = "0.4.3"
libc = "0.2.178"
log = "0.4.29"
moka = { version = "0.12.11", features = ["sync"] }
ndarray = "0.16.1"
ort = "2.0.0-rc.10"
phf = { version = "0.13.1", features = ["macros"] }
rayon = "1.11.0"
sha2 = "0.10.9"
tar = "0.4.44"
thiserror = "2.0.17"
vibrato-rkyv = { path = "./../vendor/vibrato-rkyv/vibrato", features = ["legacy"] }
walkdir = "2.5.0"
zstd = "0.13.3"


[build-dependencies]
bindgen = "0.72.1"
cc = "1.2.49"
glob = "0.3.3"
hex = "0.4.3"
walkdir = "2.5.0"
sha2 = "0.10.9"
tar = "0.4.44"
zstd = "0.13.3"
