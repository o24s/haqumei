[package]
name = "haqumei"
version = "0.1.0"
edition = "2024"
authors = ["stellanomia <fulmlumo@gmail.com>"]
description = "Haqumei is a Japanese Grapheme-to-Phoneme (G2P) library implemented in Rust."
license = "Apache-2.0"
readme = "../README.md"
homepage = "https://github.com/stellanomia/haqumei"
repository = "https://github.com/stellanomia/haqumei"
keywords = ["japanese", "g2p", "phoneme", "nlp"]
categories = ["text-processing", "parsing"]
include = [
    "src",
    "build.rs",
    "hook.c",
    "wrapper.h",
    "yomi_model",
    "dictionary",
    "vendor/open_jtalk/src",
    "dictionary.tar.zst",
    "dictionary.sha256",
    "dictionary.tar.zst.sha256",
    "compiled_dictionary.sha256",
    "tests/"
]

[features]
default = ["embed-dictionary"]
embed-dictionary = []

[dependencies]
arc-swap = "1.7.1"
dirs = "6.0.0"
hex = "0.4.3"
libc = "0.2.180"
log = "0.4.29"
moka = { version = "0.12.11", features = ["sync"] }
ndarray = "0.17.2"
ort = "2.0.0-rc.11"
phf = { version = "0.13.1", features = ["macros"] }
rayon = "1.11.0"
sha2 = "0.10.9"
tar = "0.4.44"
thiserror = "2.0.18"
vibrato-rkyv = { version = "0.7.3", features = ["legacy"] }
walkdir = "2.5.0"
zstd = "0.13.3"


[build-dependencies]
bindgen = "0.72.1"
cc = "1.2.55"
glob = "0.3.3"
hex = "0.4.3"
walkdir = "2.5.0"
sha2 = "0.10.9"
tar = "0.4.44"
zstd = "0.13.3"
