name: Deploy Docs

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build docs
        run: |
          RUSTDOCFLAGS="--cfg docsrs" cargo doc -p haqumei --no-deps --all-features

      - name: Create root index
        run: |
          echo "<meta http-equiv=\"refresh\" content=\"0; url=haqumei/index.html\">" > target/doc/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
